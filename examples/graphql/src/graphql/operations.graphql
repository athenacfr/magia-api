query GetUser($login: String!) {
  user(login: $login) {
    name
    avatarUrl
    repositories(first: 5) {
      nodes {
        name
        stargazerCount
      }
    }
  }
}

mutation CreateIssue($input: CreateIssueInput!) {
  createIssue(input: $input) {
    issue {
      id
      title
    }
  }
}
